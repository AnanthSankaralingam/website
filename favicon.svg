<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="A.S">
  <style>
    .bg { fill: #0a0a0b; }
    .fg { fill: #e4e4e7; }
    .accent { fill: #f59e0b; }
    @media (prefers-color-scheme: light) {
      .bg { fill: #f7f5f2; }
      .fg { fill: #18181b; }
      .accent { fill: #d97706; }
    }
  </style>
  <rect class="bg" width="32" height="32" rx="8" fill="#0a0a0b"/>
  <text
    x="16"
    y="16"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-weight="800"
    font-size="11.5"
    letter-spacing="-0.03em"
  >
    <tspan class="fg" fill="#e4e4e7">A</tspan><tspan class="accent" fill="#f59e0b">.</tspan><tspan class="fg" fill="#e4e4e7">S</tspan>
  </text>
</svg>
